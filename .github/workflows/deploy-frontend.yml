# Build del frontend y subida a Hostinger por FTPS (puerto 21).
#
# FileZilla con "TLS" en el log = FTPS explícito en 21 (no es lo mismo que SFTP:65002).
# El error "Permission denied (publickey,password)" en Actions era el intento por SSH/SFTP
# (puerto 65002); muchas cuentas Hostinger aceptan FTP/FTPS en 21 con user/pass y no
# autentican igual por el subsistema SSH.
#
# Secrets: FTP_HOST (sin ftp://), FTP_USERNAME, FTP_PASSWORD
# Opcional pero muy recomendado: VITE_API_URL = URL del backend (ej. https://tu-api.onrender.com
# sin /api al final). Si falta, el build usará /api relativo al dominio del sitio (Hostinger
# no tiene tu Express; la tienda y sesión contra la API remota no funcionarán bien).
# Mismo criterio que: https://www.hostinger.com/support/4480505-how-to-connect-to-your-hosting-using-ftp-in-hostinger/

name: Deploy Frontend to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Comprobar secrets de despliegue
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=""
          [ -z "$FTP_HOST" ] && missing="$missing FTP_HOST"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secrets: $missing"
            exit 1
          fi

      - name: Deploy FTPS (puerto 21 — como FileZilla con TLS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 600000
          security: loose
          server-dir: public_html/
          local-dir: ./frontend/dist/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.github*
