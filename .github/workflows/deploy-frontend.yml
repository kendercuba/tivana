# Build del frontend y subida por SFTP (puerto 65002) con OpenSSH sftp + sshpass.
#
# - Cuentas Hostinger suelen ser solo-SFTP (shell nologin): no usar "ssh comando".
# - lftp "open -u user,pass" rompe si la contraseña lleva una coma → pide password y falla.
# - sftp -b no mete la contraseña en la línea open; sshpass la inyecta bien.
#
# Secrets: FTP_HOST, FTP_USERNAME, FTP_PASSWORD (iguales que FileZilla SFTP :65002).
# Opcional: FTP_REMOTE_PATH (ruta absoluta a public_html).

name: Deploy Frontend to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Comprobar secrets de despliegue
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=""
          [ -z "$FTP_HOST" ] && missing="$missing FTP_HOST"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secrets: $missing"
            exit 1
          fi

      - name: Resolver carpeta remota (public_html)
        id: remote
        env:
          OVERRIDE: ${{ secrets.FTP_REMOTE_PATH }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "target=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Destino remoto (FTP_REMOTE_PATH): ${OVERRIDE}"
          else
            T="/home/${FTP_USER}/domains/tivana.me/public_html"
            echo "target=${T}" >> "$GITHUB_OUTPUT"
            echo "Destino remoto (por defecto): ${T}"
          fi

      # Subsistema SFTP (no login shell): válido con nologin.
      - name: Deploy SFTP — OpenSSH sftp batch (puerto 65002)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          REMOTE_TARGET: ${{ steps.remote.outputs.target }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y sshpass openssh-client

          if [ ! -d frontend/dist ]; then
            echo "::error::No existe frontend/dist tras el build."
            exit 1
          fi
          if [ -z "${REMOTE_TARGET}" ]; then
            echo "::error::REMOTE_TARGET vacío."
            exit 1
          fi

          export SSHPASS
          {
            echo "cd ${REMOTE_TARGET}"
            echo "lcd frontend/dist"
            echo "put -r ."
            echo "bye"
          } > /tmp/sftp-batch.txt

          echo "::group::sftp upload (verbose)"
          # Sin esto, ssh prueba todas las claves del runner y puede fallar antes
          # de usar la contraseña con sshpass → "Permission denied (publickey,password)".
          sshpass -e sftp -v -b /tmp/sftp-batch.txt -P 65002 \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=120 \
            -o PubkeyAuthentication=no \
            -o PreferredAuthentications=keyboard-interactive,password \
            -o NumberOfPasswordPrompts=1 \
            "${FTP_USER}@${FTP_HOST}"
          echo "::endgroup::"
          rm -f /tmp/sftp-batch.txt

          echo "::notice::SFTP terminado. Si falló el cd, define el secret FTP_REMOTE_PATH con la ruta exacta de public_html."
