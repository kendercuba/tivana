# Build del frontend y subida a Hostinger por FTPS (puerto 21).
#
# FileZilla con "TLS" en el log = FTPS explícito en 21 (no es lo mismo que SFTP:65002).
# El error "Permission denied (publickey,password)" en Actions era el intento por SSH/SFTP
# (puerto 65002); muchas cuentas Hostinger aceptan FTP/FTPS en 21 con user/pass y no
# autentican igual por el subsistema SSH.
#
# Secrets: FTP_HOST (sin ftp://), FTP_USERNAME, FTP_PASSWORD — deben ser los del MISMO plan
# Hostinger que ves en hPanel (ej. usuario u680931061). Si coinciden con otra cuenta o otro hosting,
# el deploy será "correcto" pero los archivos irán a otro sitio.
# Opcional: FTP_SERVER_DIR — carpeta remota bajo la raíz FTP (la acción exige barra final).
#   · Vacío → public_html/ (si tu FTP entra en home y ves la carpeta public_html).
#   · ./  → raíz de la sesión FTP (Hostinger: evita public_html/public_html anidada si ya estás en el sitio).
# Opcional: VITE_API_URL (URL del backend sin /api final).
# https://www.hostinger.com/support/4480505-how-to-connect-to-your-hosting-using-ftp-in-hostinger/

name: Deploy Frontend to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Marca de despliegue (busca deploy-info.txt en Hostinger tras el FTP)
        run: |
          mkdir -p frontend/public
          {
            echo "github_sha=${{ github.sha }}"
            echo "run_id=${{ github.run_id }}"
            echo "built_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "workflow=${{ github.workflow }}"
          } > frontend/public/deploy-info.txt
          cat frontend/public/deploy-info.txt

      - name: Install dependencies and build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Comprobar secrets de despliegue
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=""
          [ -z "$FTP_HOST" ] && missing="$missing FTP_HOST"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secrets: $missing"
            exit 1
          fi

      - name: Resumen del artefacto a subir
        run: |
          echo "Archivos en frontend/dist (primer nivel):"
          ls -la frontend/dist
          echo "Marca (debe existir en el servidor si el FTP apunta bien):"
          cat frontend/dist/deploy-info.txt || true
          echo "Total aproximado:"
          find frontend/dist -type f | wc -l

      # Evita depender de la expresión ${{ secrets.x || 'default' }} (a veces no aplica el secret bien).
      - name: Resolver carpeta remota FTP
        id: ftp_target
        env:
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -e
          if [ -z "${FTP_SERVER_DIR:-}" ]; then
            TARGET="public_html"
          else
            TARGET="$FTP_SERVER_DIR"
          fi
          # Una sola barra final (lo exige la acción)
          TARGET="${TARGET%/}/"
          echo "server_dir=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Usando server-dir=$TARGET (si es ./ → raíz de sesión FTP)"

      - name: Deploy FTPS (puerto 21 — como FileZilla con TLS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 600000
          security: loose
          server-dir: ${{ steps.ftp_target.outputs.server_dir }}
          local-dir: ./frontend/dist/
          dangerous-clean-slate: true
          log-level: verbose
          exclude: |
            **/.git*
            **/.github*
