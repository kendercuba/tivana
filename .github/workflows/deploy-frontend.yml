# Build del frontend y subida por SSH al puerto 65002 (SFTP Hostinger).
#
# Secrets: FTP_HOST, FTP_USERNAME, FTP_PASSWORD (iguales que en FileZilla SFTP).
# Opcional: FTP_REMOTE_PATH = ruta absoluta a public_html si la por defecto falla.
#
# En hPanel activa acceso SFTP / remote access si aplica.

name: Deploy Frontend to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Comprobar secrets de despliegue
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=""
          [ -z "$FTP_HOST" ] && missing="$missing FTP_HOST"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secrets: $missing"
            exit 1
          fi

      - name: Resolver carpeta remota (public_html)
        id: remote
        env:
          OVERRIDE: ${{ secrets.FTP_REMOTE_PATH }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "target=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Destino remoto (FTP_REMOTE_PATH): ${OVERRIDE}"
          else
            T="/home/${FTP_USER}/domains/tivana.me/public_html"
            echo "target=${T}" >> "$GITHUB_OUTPUT"
            echo "Destino remoto (por defecto): ${T}"
          fi

      # Evita appleboy/scp-action: en Hostinger suele fallar por rutas o auth.
      # ssh + tar solo necesita OpenSSH en el servidor (puerto 65002).
      - name: Deploy SSH — tar por stdin (puerto 65002)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          REMOTE_TARGET: ${{ steps.remote.outputs.target }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y sshpass openssh-client

          if [ ! -d frontend/dist ]; then
            echo "::error::No existe frontend/dist tras el build."
            exit 1
          fi

          if [ -z "${REMOTE_TARGET}" ]; then
            echo "::error::REMOTE_TARGET vacío (bug en paso anterior)."
            exit 1
          fi

          export SSHPASS
          SSH_BASE=(ssh -p 65002 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=120 -o ServerAliveInterval=30)
          DEST="${FTP_USER}@${FTP_HOST}"

          echo "::group::Probar SSH / crear carpeta remota"
          sshpass -e "${SSH_BASE[@]}" "$DEST" \
            "set -e; mkdir -p '${REMOTE_TARGET}'; echo OK; ls -la '${REMOTE_TARGET}' | head -20"
          echo "::endgroup::"

          echo "::group::Vaciar destino y subir archivos"
          sshpass -e "${SSH_BASE[@]}" "$DEST" \
            "rm -rf '${REMOTE_TARGET}'/*"
          tar czf - -C frontend/dist . | sshpass -e "${SSH_BASE[@]}" "$DEST" \
            "tar xzf - -C '${REMOTE_TARGET}'"
          echo "::endgroup::"

          echo "::notice::Listo. Sitio en ${REMOTE_TARGET}"
