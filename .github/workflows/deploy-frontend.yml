# Build del frontend y subida a Hostinger por SFTP (puerto 65002).
#
# Hostinger: la cuenta suele usar SFTP en 65002 (no FTP 21). GitHub Actions
# a menudo no puede conectar al puerto 21 (timeout).
#
# Secrets en repo → Settings → Secrets → Actions:
#   FTP_HOST       → misma IP/host que en el panel (ej. 46.202.x.x)
#   FTP_USERNAME   → usuario (ej. u680931061)
#   FTP_PASSWORD   → contraseña FTP/SFTP
#
# Opcional:
#   FTP_REMOTE_PATH → ruta ABSOLUTA a public_html si la por defecto falla.
#                     En File Manager de Hostinger suele verse en la barra (copiar).
#
# En hPanel activa acceso remoto / SFTP si tu plan lo permite.

name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Comprobar secrets de despliegue
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=""
          [ -z "$FTP_HOST" ] && missing="$missing FTP_HOST"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secrets: $missing"
            exit 1
          fi

      - name: Resolver carpeta remota (public_html)
        id: remote
        env:
          OVERRIDE: ${{ secrets.FTP_REMOTE_PATH }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "target=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Destino remoto (FTP_REMOTE_PATH): ${OVERRIDE}"
          else
            T="/home/${FTP_USER}/domains/tivana.me/public_html"
            echo "target=${T}" >> "$GITHUB_OUTPUT"
            echo "Destino remoto (por defecto): ${T}"
          fi

      # Puerto 65002 = SFTP/SSH en Hostinger (misma contraseña que FTP).
      # appleboy/scp-action envía por SSH/tar (no depende de rsync en el servidor).
      - name: Deploy por SCP / SSH (puerto 65002)
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: "65002"
          timeout: 3m
          command_timeout: 15m
          source: frontend/dist
          target: ${{ steps.remote.outputs.target }}
          overwrite: true
          rm: false
          debug: false
