# Build del frontend y subida por SFTP (puerto 65002) con lftp mirror.
#
# Por qué fallaba "ssh ... comando": las cuentas Hostinger suelen tener shell
# /sbin/nologin (solo SFTP). ssh ejecuta un shell remoto → error nologin.
# FileZilla funciona porque usa el protocolo SFTP, no comandos SSH.
#
# El monorepo no es la causa: antes el workflow probablemente usaba FTP:21
# (SamKirkland). Aquí el build sigue siendo "cd frontend && npm ci && build".
#
# Secrets: FTP_HOST, FTP_USERNAME, FTP_PASSWORD (iguales que FileZilla SFTP).
# Opcional: FTP_REMOTE_PATH (ruta absoluta a public_html).

name: Deploy Frontend to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Comprobar secrets de despliegue
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=""
          [ -z "$FTP_HOST" ] && missing="$missing FTP_HOST"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secrets: $missing"
            exit 1
          fi

      - name: Resolver carpeta remota (public_html)
        id: remote
        env:
          OVERRIDE: ${{ secrets.FTP_REMOTE_PATH }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "target=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Destino remoto (FTP_REMOTE_PATH): ${OVERRIDE}"
          else
            T="/home/${FTP_USER}/domains/tivana.me/public_html"
            echo "target=${T}" >> "$GITHUB_OUTPUT"
            echo "Destino remoto (por defecto): ${T}"
          fi

      # Solo SFTP (sin shell remoto): compatible con cuentas nologin.
      - name: Deploy SFTP — lftp mirror (puerto 65002)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_TARGET: ${{ steps.remote.outputs.target }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y lftp

          if [ ! -d frontend/dist ]; then
            echo "::error::No existe frontend/dist tras el build."
            exit 1
          fi
          if [ -z "${REMOTE_TARGET}" ]; then
            echo "::error::REMOTE_TARGET vacío."
            exit 1
          fi

          cat > /tmp/lftp.rc <<EOF
          set net:timeout 120
          set net:max-retries 5
          set sftp:auto-confirm yes
          set cmd:fail-exit yes
          open -u ${FTP_USER},${FTP_PASSWORD} sftp://${FTP_HOST}:65002
          cd ${REMOTE_TARGET}
          lcd frontend/dist
          mirror -R --delete --verbose .
          bye
          EOF

          echo "::group::lftp mirror"
          lftp -f /tmp/lftp.rc
          echo "::endgroup::"
          rm -f /tmp/lftp.rc

          echo "::notice::Despliegue SFTP terminado."
