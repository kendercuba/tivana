# Despliegue del build de Vite (frontend/dist) a Hostinger por FTP.
# Secrets obligatorios en el repo: Settings → Secrets and variables → Actions
#   FTP_HOST       → servidor FTP (ej. ftp.tudominio.com)
#   FTP_USERNAME   → usuario FTP
#   FTP_PASSWORD   → contraseña FTP
# Opcional en Hostinger: revisar que la carpeta remota coincida (server-dir si hace falta).

name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Comprobar secrets FTP (evita error genérico «server»)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=""
          [ -z "$FTP_HOST" ] && missing="$missing FTP_HOST"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secrets en GitHub: $missing. Repo → Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.github*
