name: Deploy Backend to Droplet

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    name: Deploy on Droplet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: SSH pull and restart
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          # Git lives in /root/tivana-backend (monorepo). PM2 runs /var/www/backend (no .git there).
          # Pull then sync backend/ → /var/www/backend, refresh deps, restart.
          script: |
            set -e
            cd /root/tivana-backend
            git pull origin main
            if [ -d backend ]; then
              SRC="/root/tivana-backend/backend/"
            else
              SRC="/root/tivana-backend/"
            fi
            rsync -a "${SRC}" /var/www/backend/ \
              --exclude='.env' \
              --exclude='node_modules' \
              --exclude='uploads'
            cd /var/www/backend
            if [ -f package-lock.json ]; then npm ci --omit=dev; else npm install --omit=dev; fi
            pm2 restart tivana-backend
