name: Deploy Backend to Droplet

on:
  # Run from Actions tab when only frontend changed but you need backend redeployed.
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    name: Deploy on Droplet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: SSH pull and restart
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          # Production code must match monorepo kendercuba/tivana (folder backend/).
          # The old repo kendercuba/tivana-backend can lag behind → 404 on new routes (e.g. Loyverse).
          # PM2 runs from /var/www/backend (no .git); we clone/pull tivana then rsync backend/.
          script: |
            set -e
            MONO=/root/tivana-monorepo
            if [ ! -d "$MONO/.git" ]; then
              git clone https://github.com/kendercuba/tivana.git "$MONO"
            fi
            cd "$MONO"
            git fetch origin main
            git reset --hard origin/main
            rsync -a "${MONO}/backend/" /var/www/backend/ \
              --exclude='.env' \
              --exclude='node_modules' \
              --exclude='uploads' \
              --exclude='.git'
            cd /var/www/backend
            node -e "const m=+process.version.slice(1).split('.')[0]; if(m<20){console.error('ERROR: Node.js 20+ is required on the Droplet. Current:', process.version); console.error('Run: curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs'); process.exit(1)}"
            if [ -f package-lock.json ]; then npm ci --omit=dev; else npm install --omit=dev; fi
            pm2 restart tivana-backend
